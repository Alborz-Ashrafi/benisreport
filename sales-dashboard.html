<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گزارش کامل فروش کالاهای بنیس</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- کتابخانه خواندن اکسل -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/pinar-font@v1.0.0-alpha1/dist/font-face.css" rel="stylesheet" type="text/css" />
    <style>
        body { font-family: 'Pinar', 'Tahoma', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-6 text-slate-800">

    <div class="max-w-7xl mx-auto">
        <!-- دکمه بازگشت -->
        <div class="mb-4">
            <a href="index.html" class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-slate-800 transition">
                <span class="ml-1">←</span> بازگشت به صفحه اصلی
            </a>
        </div>

        <!-- هدر گزارش -->
        <header class="bg-slate-900 text-white p-8 rounded-2xl shadow-xs mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-black">📊 گزارش جامع آمار فروش محصولات بنیس</h1>
                <p class="text-slate-400 mt-2 text-sm">دیتای زنده بارگذاری شده مستقیم از فایل اکسل (sheet2.xlsx)</p>
            </div>
            <!-- باکس جستجو زنده -->
            <div class="w-full md:w-72">
                <input type="text" id="search-input" onkeyup="filterTable()" placeholder="🔍 جستجوی نام یا کد کالا..." class="w-full px-4 py-2.5 bg-slate-800 text-white rounded-xl border border-slate-700 text-sm focus:outline-none focus:border-indigo-500 transition-colors">
            </div>
        </header>

        <!-- وضعیت لودینگ / خطا -->
        <div id="status-message" class="bg-blue-50 text-blue-700 p-6 rounded-2xl font-bold text-center animate-pulse border border-blue-100">
            ⏳ در حال خواندن و استخراج کل اطلاعات از فایل اکسل...
        </div>

        <!-- جدول اطلاعات (در ابتدا پنهان است) -->
        <div id="table-container" class="hidden bg-white rounded-2xl border border-slate-200 shadow-xs overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse text-xs md:text-sm">
                    <thead class="bg-slate-100 text-slate-700 font-bold border-b border-slate-200 sticky top-0">
                        <tr>
                            <th class="p-4 whitespace-nowrap">کد کالا</th>
                            <th class="p-4 min-w-[220px]">نام کالا</th>
                            <th class="p-3 text-center">فروردین</th>
                            <th class="p-3 text-center">اردیبهشت</th>
                            <th class="p-3 text-center">خرداد</th>
                            <th class="p-3 text-center">تیر</th>
                            <th class="p-3 text-center">مرداد</th>
                            <th class="p-3 text-center">شهریور</th>
                            <th class="p-3 text-center">مهر</th>
                            <th class="p-3 text-center">آبان</th>
                            <th class="p-3 text-center">آذر/آذیر</th>
                            <th class="p-3 text-center">دی</th>
                            <th class="p-3 text-center">بهمن</th>
                            <th class="p-3 text-center">اسفند</th>
                            <th class="p-4 text-center bg-indigo-50 text-indigo-950 font-black rounded-tl-xl">جمع کل (Total)</th>
                        </tr>
                    </thead>
                    <tbody id="excel-table-body" class="divide-y divide-slate-100 text-slate-600">
                        <!-- ردیف‌های اکسل اینجا تزریق میشن -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // خواندن زنده فایل اکسل شما
        fetch('sheet2.xlsx')
            .then(res => {
                if(!res.ok) throw new Error();
                return res.arrayBuffer();
            })
            .then(ab => {
                const workbook = XLSX.read(new Uint8Array(ab), {type: 'array'});
                // باز کردن اولین شیت اکسل شما
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                // تبدیل اطلاعات به لیست آرایه‌ها
                const rows = XLSX.utils.sheet_to_json(worksheet);

                const tableBody = document.getElementById('excel-table-body');
                tableBody.innerHTML = ''; // پاک کردن دیتای فیک قبلی

                // چرخیدن روی تمام ردیف‌های فایل اکسل شما
                rows.forEach(row => {
                    // اگر سطر معتبری باشه رندرش کن
                    if (row['نام كالا'] || row['كد كالا']) {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-slate-50/80 transition-colors";

                        // فرمت دهی اعداد برای نمایش با ویرگول (سه رقم سه رقم)
                        const fmt = (val) => val !== undefined && val !== null ? Number(val).toLocaleString('fa-IR') : '۰';

                        tr.innerHTML = `
                            <td class="p-4 font-mono text-slate-400 whitespace-nowrap">${row['كد كالا'] || '-'}</td>
                            <td class="p-4 font-bold text-slate-900">${row['نام كالا'] || '-'}</td>
                            <td class="p-3 text-center">${fmt(row['فروردین'])}</td>
                            <td class="p-3 text-center">${fmt(row['اردیبهشت'])}</td>
                            <td class="p-3 text-center">${fmt(row['خرداد'])}</td>
                            <td class="p-3 text-center">${fmt(row['تیر'])}</td>
                            <td class="p-3 text-center">${fmt(row['مرداد'])}</td>
                            <td class="p-3 text-center">${fmt(row['شهریور'])}</td>
                            <td class="p-3 text-center">${fmt(row['مهر'])}</td>
                            <td class="p-3 text-center">${fmt(row['آبان'])}</td>
                            <td class="p-3 text-center">${fmt(row['آذر'] || row['آذیر'])}</td>
                            <td class="p-3 text-center">${fmt(row['دی'])}</td>
                            <td class="p-3 text-center">${fmt(row['بهمن'])}</td>
                            <td class="p-3 text-center">${fmt(row['اسفند'])}</td>
                            <td class="p-4 text-center bg-indigo-50/40 text-indigo-600 font-bold">${fmt(row['Total'])}</td>
                        `;
                        tableBody.appendChild(tr);
                    }
                });

                // پنهان کردن پیام لودینگ و فعال‌سازی جدول اصلی
                document.getElementById('status-message').classList.add('hidden');
                document.getElementById('table-container').classList.remove('hidden');
            })
            .catch(err => {
                const msg = document.getElementById('status-message');
                msg.classList.remove('bg-blue-50', 'text-blue-700', 'animate-pulse');
                msg.classList.add('bg-red-50', 'text-red-700');
                msg.innerText = "❌ خطا: فایل اکسل با نام دقیق 'sheet2.xlsx' پیدا نشد. لطفاً آن را آپلود کنید.";
            });

        // جاوااسکریپت برای سرچ همزمان در جدول
        function filterTable() {
            const input = document.getElementById("search-input");
            const filter = input.value.toLowerCase();
            const table = document.getElementById("excel-table-body");
            const tr = table.getElementsByTagName("tr");

            for (let i = 0; i < tr.length; i++) {
                const tdCode = tr[i].getElementsByTagName("td")[0];
                const tdName = tr[i].getElementsByTagName("td")[1];
                if (tdCode || tdName) {
                    const textCode = tdCode.textContent || tdCode.innerText;
                    const textName = tdName.textContent || tdName.innerText;
                    if (textCode.toLowerCase().indexOf(filter) > -1 || textName.toLowerCase().indexOf(filter) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }
            }
        }
    </script>
</body>
</html>
